              <stop offset="100%" stop-color="#ad081b"/>
            </linearGradient>
          </defs>
        </svg>
        <span class="logo-text">PinBoard</span>
      </div>

      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 20 20" fill="none">
          <circle cx="9" cy="9" r="6" stroke="currentColor" stroke-width="1.8"/>
          <path d="M13.5 13.5L17 17" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>

        <input class="search-input" id="searchInput" type="text" placeholder="Search images…" autocomplete="off" />
        <button class="search-clear" id="searchClear" aria-label="Clear search" hidden>✕</button>
      </div>

      <div class="header-actions">
        <button class="btn-pill btn-ghost" id="viewToggle" aria-label="Toggle view">

    <div class="lb-backdrop" id="lbBackdrop"></div>
    <div class="lb-container">

      <button class="lb-close" id="lbClose" aria-label="Close">
        <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" fill="none">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>

      <button class="lb-arrow lb-prev" id="lbPrev" aria-label="Previous image">
        <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>

      <div class="lb-img-wrap" id="lbImgWrap">
        <div class="lb-loader" id="lbLoader">
          <div class="lb-spinner"></div>
        </div>
        <img class="lb-img" id="lbImg" src="" alt="" />
      </div>

      <button class="lb-arrow lb-next" id="lbNext" aria-label="Next image">
        <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </button>

    </div>

    <div class="lb-info">
      <div class="lb-meta">
        <span class="lb-tag" id="lbTag"></span>
        <span class="lb-title-text" id="lbTitle"></span>
      </div>
      <span class="lb-counter" id="lbCounter"></span>
    </div>

    <!-- Thumbnail strip -->
    <div class="lb-thumbs" id="lbThumbs"></div>
  </div>
